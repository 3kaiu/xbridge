name: Release (all packages)

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── H5 SDK: publish to npm ──────────────────────────────────────────────
  js-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Build & publish
        run: |
          cd packages/xbridge-js
          npm ci
          npm run build
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Rust core: publish to crates.io ────────────────────────────────────
  rust-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: cd rust/xbridge_core && cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  # ── GitHub Release with auto-generated notes ────────────────────────────
  github-release:
    needs: [js-publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            ### H5 (npm)
            ```bash
            pnpm add xbridge-js
            ```

            ### Flutter (git dependency)
            ```yaml
            # pubspec.yaml
            xbridge_flutter:
              git:
                url: https://github.com/3kaiu/xbridge.git
                path: packages/xbridge_flutter
                ref: ${{ github.ref_name }}
            ```

            ### Android (JitPack)
            ```groovy
            // build.gradle
            implementation 'com.github.3kaiu.xbridge:xbridge-core:${{ github.ref_name }}'
            ```
            > JitPack builds automatically when a tag is pushed. Check
            > [JitPack](https://jitpack.io/com/github/3kaiu/xbridge) for build status.

            ### iOS (CocoaPods git)
            ```ruby
            # Podfile
            pod 'XBridgeiOS/Core', :git => 'https://github.com/3kaiu/xbridge.git', :tag => '${{ github.ref_name }}'
            ```

            ### Rust (crates.io)
            ```bash
            cargo add xbridge_core
            ```

            > Note: tag format is `v0.1.0` for the git ref, but JitPack and
            > crates.io strip the `v` prefix to get version `0.1.0`.

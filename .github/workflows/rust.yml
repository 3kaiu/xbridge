name: Rust Core (xbridge_core)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'rust/xbridge_core/**'
      - '.github/workflows/rust.yml'
  pull_request:
    paths:
      - 'rust/xbridge_core/**'
      - '.github/workflows/rust.yml'

defaults:
  run:
    working-directory: rust/xbridge_core

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/xbridge_core

      - name: Check
        run: cargo check --all-targets

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build cdylib
        run: cargo build --release

  # Cross-compile checks for mobile targets. We use `cargo check` (not
  # `cargo build`) to avoid the linker step — the Android NDK linker is
  # not installed in the CI runner. `cargo check` type-checks the code
  # against the target's std library, catching target-specific issues
  # (e.g. platform-conditional compilation) without linking.
  cross-compile-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/xbridge_core

      - name: Check aarch64-linux-android
        working-directory: rust/xbridge_core
        run: cargo check --target aarch64-linux-android

      - name: Check armv7-linux-androideabi
        working-directory: rust/xbridge_core
        run: cargo check --target armv7-linux-androideabi

      - name: Check x86_64-linux-android
        working-directory: rust/xbridge_core
        run: cargo check --target x86_64-linux-android

  cross-compile-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/xbridge_core

      - name: Check aarch64-apple-ios
        working-directory: rust/xbridge_core
        run: cargo check --target aarch64-apple-ios

      - name: Check x86_64-apple-ios
        working-directory: rust/xbridge_core
        run: cargo check --target x86_64-apple-ios

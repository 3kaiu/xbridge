name: Rust Core (xbridge_core)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'rust/xbridge_core/**'
      - '.github/workflows/rust.yml'
  pull_request:
    paths:
      - 'rust/xbridge_core/**'
      - '.github/workflows/rust.yml'

defaults:
  run:
    working-directory: rust/xbridge_core

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/xbridge_core

      - name: Check
        run: cargo check --all-targets

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build cdylib
        run: cargo build --release

  # Cross-compile for mobile targets to catch target-specific breakage.
  cross-compile-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/xbridge_core

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

      - name: Build for aarch64-linux-android
        working-directory: rust/xbridge_core
        run: cargo build --release --target aarch64-linux-android

      - name: Build for armv7-linux-androideabi
        working-directory: rust/xbridge_core
        run: cargo build --release --target armv7-linux-androideabi

      - name: Build for x86_64-linux-android
        working-directory: rust/xbridge_core
        run: cargo build --release --target x86_64-linux-android

  cross-compile-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/xbridge_core

      - name: Build for aarch64-apple-ios
        working-directory: rust/xbridge_core
        run: cargo build --release --target aarch64-apple-ios

      - name: Build for x86_64-apple-ios
        working-directory: rust/xbridge_core
        run: cargo build --release --target x86_64-apple-ios

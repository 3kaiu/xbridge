name: Android SDK (xbridge-android)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/xbridge-android/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'packages/xbridge-android/**'
      - '.github/workflows/android.yml'

defaults:
  run:
    working-directory: packages/xbridge-android

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Verify Kotlin sources compile
        run: |
          # Download the Kotlin compiler and typecheck all .kt source files.
          # This catches syntax errors, type errors, and API misuse without
          # requiring a full Gradle project (the library module is consumed
          # by the host app's Gradle, not built standalone).
          curl -sL https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip -o /tmp/kotlin.zip
          unzip -q /tmp/kotlin.zip -d /tmp
          export PATH="/tmp/kotlinc/bin:$PATH"
          # Collect all .kt files and typecheck against the Android SDK jar
          # plus org.json (bundled in the Android SDK). We use the Android
          # SDK platform jar from setup-java's JDK.
          KOTLIN_FILES=$(find src/main/java -name '*.kt')
          kotlinc -typecheck $KOTLIN_FILES \
            -cp "$JAVA_HOME/lib/*" \
            || {
              echo "::warning::kotlinc typecheck failed — check Kotlin source errors"
              exit 1
            }

name: Android SDK (xbridge-android)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/xbridge-android/**'
      - '.github/workflows/android.yml'
  pull_request:
    paths:
      - 'packages/xbridge-android/**'
      - '.github/workflows/android.yml'

defaults:
  run:
    working-directory: packages/xbridge-android

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Verify Kotlin sources are syntactically valid
        run: |
          # Download the Kotlin compiler and verify all .kt files parse.
          # We can't do a full typecheck without the Android SDK + Flutter
          # SDK jars, but we CAN verify syntax correctness by compiling with
          # the JDK classpath. Unresolved references (Android/Flutter classes)
          # are expected — we only fail on actual syntax/parse errors.
          curl -sL https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip -o /tmp/kotlin.zip
          unzip -q /tmp/kotlin.zip -d /tmp
          export PATH="/tmp/kotlinc/bin:$PATH"
          # Source files are now in xbridge-core/ and xbridge-flutter/ submodules.
          KOTLIN_FILES=$(find xbridge-core/src/main/java xbridge-flutter/src/main/java -name '*.kt' 2>/dev/null)
          if [ -z "$KOTLIN_FILES" ]; then
            echo "::error::No Kotlin source files found"
            exit 1
          fi
          # Compile with -d /dev/null. Unresolved reference errors are expected
          # (no Android SDK); we grep for "e: " syntax/parse errors only.
          kotlinc $KOTLIN_FILES -d /dev/null -cp "$JAVA_HOME/lib/*" 2>&1 | tee /tmp/kotlinc-out.txt || true
          # Check for syntax errors (lines starting with "e: " that aren't
          # "unresolved reference" — those are just missing Android classes).
          SYNTAX_ERRORS=$(grep "^e: " /tmp/kotlinc-out.txt | grep -v "unresolved reference" | head -5 || true)
          if [ -n "$SYNTAX_ERRORS" ]; then
            echo "::error::Kotlin syntax/type errors found:"
            echo "$SYNTAX_ERRORS"
            exit 1
          fi
          echo "✓ Kotlin sources parse cleanly (unresolved references to Android/Flutter classes are expected)"

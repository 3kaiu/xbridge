apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

// ── Maven distribution metadata ──────────────────────────────────────────────
// Pure native apps can depend on this module alone:
//   implementation 'com.github.3kaiu.xbridge:xbridge-core:0.1.0'
// (JitPack resolves the group from the GitHub org/repo)
group = 'io.xbridge'
version = '0.1.0'

android {
    namespace 'io.xbridge.core'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 34
        consumerProguardFiles 'consumer-rules.pro'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main {
            // Native .so libraries (libxbridge_core.so) are placed here
            // by CI or by the consumer. See README.
            jniLibs.srcDirs = ['src/main/jniLibs']
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    // Zero Flutter dependency — this module is pure Kotlin.
    // AndroidX annotations only.
    compileOnly 'androidx.annotation:annotation:1.7.1'
}

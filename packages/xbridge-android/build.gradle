// Root build.gradle — configuration for all subprojects.
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.2'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        // Flutter engine artifacts are published to a Maven repo on the
        // Flutter SDK's storage. The host app's Flutter tooling provides this
        // automatically; for standalone builds we add it here.
        maven { url "https://storage.googleapis.com/download.flutter.io" }
    }
}

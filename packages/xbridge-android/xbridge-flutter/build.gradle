apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

// ── Maven distribution metadata ──────────────────────────────────────────────
// Flutter apps get this module transitively via the Flutter plugin system.
// It depends on :xbridge-core for the core sync/security/JNI classes.
group = 'io.xbridge'
version = '0.1.0'

android {
    namespace 'io.xbridge.flutter'
    compileSdk 34

    defaultConfig {
        minSdk 21
        targetSdk 34
        consumerProguardFiles 'consumer-rules.pro'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    // Core module — provides sync interface, security policy, JNI bridge.
    api project(':xbridge-core')

    // Flutter embedding — provided by the host app at runtime.
    // compileOnly so the library compiles standalone; the host app's
    // Flutter Gradle tooling provides the actual artifact.
    compileOnly 'io.flutter:flutter_embedding_debug:1.0.0-dbed2c7f7ee5fe5a437f5c5418e5a25d0611d7a8'
    compileOnly 'io.flutter:flutter_embedding_release:1.0.0-dbed2c7f7ee5fe5a437f5c5418e5a25d0611d7a8'

    compileOnly 'androidx.annotation:annotation:1.7.1'
}

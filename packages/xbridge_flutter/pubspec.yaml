name: xbridge_flutter
description: A generic, business-free cross-platform bridge SDK for Flutter WebView H5 integration.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  xbridge_protocol:
    path: ../xbridge_protocol
  xbridge_platform_interface:
    path: ../xbridge_platform_interface
  ffi: ^2.1.0
  webview_flutter: ^4.0.0
  flutter_inappwebview: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        package: io.xbridge
        pluginClass: XBridgePlugin
      ios:
        pluginClass: XBridgePlugin
